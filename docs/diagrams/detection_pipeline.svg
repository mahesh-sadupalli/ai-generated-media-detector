<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="s3"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#475569"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#10b981"/></marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#ef4444"/></marker>
  </defs>

  <rect width="900" height="680" fill="url(#bg3)" rx="12"/>

  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">COMPRESSION-AWARE DETECTION PIPELINE</text>
  <text x="450" y="54" text-anchor="middle" fill="#94a3b8" font-size="11">Thesis-informed architecture: measure compression first, then adjust detection</text>

  <!-- Input -->
  <g filter="url(#s3)">
    <rect x="355" y="70" width="190" height="44" rx="22" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="450" y="97" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Input Image / Video Frame</text>
  </g>
  <line x1="450" y1="114" x2="450" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Face Detection -->
  <g filter="url(#s3)">
    <rect x="355" y="144" width="190" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="450" y="167" text-anchor="middle" fill="#cbd5e1" font-size="11">Face Detection + Extraction</text>
  </g>
  <line x1="450" y1="180" x2="450" y2="210" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Split into two branches -->
  <!-- Left branch: Compression Estimator -->
  <line x1="450" y1="210" x2="190" y2="240" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Right branch: Detectors -->
  <line x1="450" y1="210" x2="650" y2="240" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- COMPRESSION ESTIMATOR (left) -->
  <g filter="url(#s3)">
    <rect x="50" y="244" width="280" height="170" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="50" y="244" width="280" height="30" rx="10" fill="#f59e0b" fill-opacity="0.15"/>
    <rect x="50" y="264" width="280" height="10" fill="#1e293b"/>
    <text x="190" y="265" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">COMPRESSION ESTIMATOR</text>
    <text x="190" y="282" text-anchor="middle" fill="#92400e" font-size="9">Thesis insight: measure before you detect</text>
  </g>

  <rect x="65" y="296" width="120" height="28" rx="5" fill="#0f172a" stroke="#d97706" stroke-width="0.5"/>
  <text x="125" y="314" text-anchor="middle" fill="#fcd34d" font-size="9">Blockiness (0.35)</text>

  <rect x="195" y="296" width="120" height="28" rx="5" fill="#0f172a" stroke="#d97706" stroke-width="0.5"/>
  <text x="255" y="314" text-anchor="middle" fill="#fcd34d" font-size="9">Quantization (0.25)</text>

  <rect x="65" y="332" width="120" height="28" rx="5" fill="#0f172a" stroke="#d97706" stroke-width="0.5"/>
  <text x="125" y="350" text-anchor="middle" fill="#fcd34d" font-size="9">HF Energy Loss (0.25)</text>

  <rect x="195" y="332" width="120" height="28" rx="5" fill="#0f172a" stroke="#d97706" stroke-width="0.5"/>
  <text x="255" y="350" text-anchor="middle" fill="#fcd34d" font-size="9">Flat Regions (0.15)</text>

  <!-- Output of compression estimator -->
  <rect x="90" y="374" width="200" height="28" rx="14" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="190" y="393" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Attenuation Factor [0.3 - 1.0]</text>

  <!-- DETECTORS (right) -->
  <g filter="url(#s3)">
    <rect x="470" y="244" width="400" height="170" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="470" y="244" width="400" height="30" rx="10" fill="#6366f1" fill-opacity="0.15"/>
    <rect x="470" y="264" width="400" height="10" fill="#1e293b"/>
    <text x="670" y="265" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="700">ARTIFACT DETECTORS</text>
    <text x="670" y="282" text-anchor="middle" fill="#4338ca" font-size="9">Raw scores — unaware of compression</text>
  </g>

  <!-- GAN detectors -->
  <text x="485" y="304" fill="#818cf8" font-size="9" font-weight="600">GAN DETECTORS</text>
  <rect x="485" y="310" width="175" height="24" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="572" y="326" text-anchor="middle" fill="#fca5a5" font-size="9">Smoothing (w: 0.5)</text>
  <circle cx="842" cy="322" r="4" fill="#ef4444" fill-opacity="0.6"/>

  <rect x="485" y="340" width="175" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="572" y="356" text-anchor="middle" fill="#cbd5e1" font-size="9">Texture (w: 0.1)</text>

  <rect x="485" y="370" width="175" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="572" y="386" text-anchor="middle" fill="#cbd5e1" font-size="9">Mode Collapse (w: 0.4)</text>

  <!-- Diffusion detectors -->
  <text x="680" y="304" fill="#818cf8" font-size="9" font-weight="600">DIFFUSION DETECTOR</text>
  <rect x="680" y="310" width="175" height="24" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="767" y="326" text-anchor="middle" fill="#fca5a5" font-size="9">Reconstruction Error</text>
  <circle cx="842" cy="322" r="4" fill="#ef4444" fill-opacity="0.6"/>

  <rect x="680" y="340" width="175" height="24" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="767" y="356" text-anchor="middle" fill="#cbd5e1" font-size="9">Spectral Fingerprint</text>

  <rect x="680" y="370" width="175" height="24" rx="4" fill="#0f172a" stroke="#ef4444" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="767" y="386" text-anchor="middle" fill="#fca5a5" font-size="9">Noise Residual</text>
  <circle cx="842" cy="382" r="4" fill="#ef4444" fill-opacity="0.6"/>

  <!-- Legend for red dots -->
  <circle cx="760" y="404" r="4" fill="#ef4444" fill-opacity="0.6"/>
  <text x="770" y="408" fill="#f87171" font-size="8">= compression-sensitive (attenuated)</text>

  <!-- Merge point -->
  <line x1="190" y1="402" x2="190" y2="460" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="190" y1="460" x2="420" y2="460" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="670" y1="414" x2="670" y2="460" stroke="#475569" stroke-width="1.5"/>
  <line x1="670" y1="460" x2="480" y2="460" stroke="#475569" stroke-width="1.5"/>

  <!-- Adjustment box -->
  <g filter="url(#s3)">
    <rect x="330" y="440" width="240" height="50" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="450" y="462" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">COMPRESSION ADJUSTMENT</text>
    <text x="450" y="480" text-anchor="middle" fill="#94a3b8" font-size="9">Attenuate sensitive scores, preserve robust ones</text>
  </g>

  <line x1="450" y1="490" x2="450" y2="520" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Classification -->
  <g filter="url(#s3)">
    <rect x="310" y="524" width="280" height="44" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="450" y="551" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">3-Class Classification + Explanation</text>
  </g>

  <line x1="450" y1="568" x2="450" y2="595" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <g filter="url(#s3)">
    <rect x="160" y="600" width="170" height="40" rx="20" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
    <text x="245" y="625" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">REAL</text>
  </g>
  <g filter="url(#s3)">
    <rect x="365" y="600" width="170" height="40" rx="20" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
    <text x="450" y="625" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">GAN-GENERATED</text>
  </g>
  <g filter="url(#s3)">
    <rect x="570" y="600" width="195" height="40" rx="20" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-width="1.5"/>
    <text x="667" y="625" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="700">DIFFUSION-GENERATED</text>
  </g>

  <!-- Connecting lines to outputs -->
  <line x1="380" y1="568" x2="245" y2="598" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="450" y1="568" x2="450" y2="598" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="520" y1="568" x2="667" y2="598" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Annotation -->
  <rect x="50" y="650" width="800" height="22" rx="4" fill="#0f172a"/>
  <text x="450" y="666" text-anchor="middle" fill="#64748b" font-size="10">Key innovation: compression estimation happens BEFORE detection scoring — informed by thesis research on how neural networks reconstruct signals</text>
</svg>
