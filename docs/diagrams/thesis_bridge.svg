<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="thesisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="detectGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>

  <rect width="900" height="600" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">FROM NEURAL COMPRESSION TO DEEPFAKE DETECTION</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">How master thesis findings directly solve the detection problem</text>

  <!-- LEFT: Thesis -->
  <g filter="url(#s2)">
    <rect x="25" y="80" width="280" height="490" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="25" y="80" width="280" height="36" rx="10" fill="url(#thesisGrad)"/>
    <rect x="25" y="106" width="280" height="10" fill="#1e293b"/>
    <text x="165" y="104" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">MASTER THESIS</text>
  </g>
  <text x="165" y="140" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">INR Compression of Spatio-Temporal Data</text>
  <text x="165" y="156" text-anchor="middle" fill="#64748b" font-size="9">BTU Cottbus-Senftenberg, 2026</text>

  <!-- Thesis findings -->
  <rect x="40" y="172" width="250" height="52" rx="6" fill="#0f172a" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.3"/>
  <text x="55" y="192" fill="#c4b5fd" font-size="10" font-weight="600">3 Architectures: INR + Conv AE + Linear AE</text>
  <text x="55" y="208" fill="#94a3b8" font-size="9">INR 35.72 dB | Conv AE 93.6:1 | Linear AE 37.90 dB</text>

  <rect x="40" y="234" width="250" height="66" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="55" y="254" fill="#fca5a5" font-size="10" font-weight="600">Catastrophic Forgetting: -22.81 dB</text>
  <text x="55" y="270" fill="#94a3b8" font-size="9">Large online: 35.99 dB drops to 13.18 dB</text>
  <text x="55" y="286" fill="#f87171" font-size="9" font-weight="600">Larger models forget MORE</text>

  <rect x="40" y="310" width="250" height="52" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="55" y="330" fill="#6ee7b7" font-size="10" font-weight="600">ER Aggressive: +9.89 dB recovery</text>
  <text x="55" y="346" fill="#94a3b8" font-size="9">Only CL strategy that works for INRs</text>

  <rect x="40" y="372" width="250" height="52" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="55" y="392" fill="#fca5a5" font-size="10" font-weight="600">EWC / LwF: FAIL</text>
  <text x="55" y="408" fill="#94a3b8" font-size="9">Shared parameter spaces break regularization</text>

  <rect x="40" y="434" width="250" height="52" rx="6" fill="#0f172a" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="55" y="454" fill="#a5b4fc" font-size="10" font-weight="600">INRs learn continuous functions</text>
  <text x="55" y="470" fill="#94a3b8" font-size="9">Structural signal, not pixel memorization</text>

  <rect x="40" y="496" width="250" height="52" rx="6" fill="#0f172a" stroke="#818cf8" stroke-width="1" stroke-opacity="0.3"/>
  <text x="55" y="516" fill="#a5b4fc" font-size="10" font-weight="600">100K buffer, 1.0 replay weight</text>
  <text x="55" y="532" fill="#94a3b8" font-size="9">Optimal ER Aggressive config, 23% overhead</text>

  <!-- RIGHT: Detection -->
  <g filter="url(#s2)">
    <rect x="595" y="80" width="280" height="490" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <rect x="595" y="80" width="280" height="36" rx="10" fill="url(#detectGrad)"/>
    <rect x="595" y="106" width="280" height="10" fill="#1e293b"/>
    <text x="735" y="104" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">DETECTION PROJECT</text>
  </g>
  <text x="735" y="140" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">AI-Generated Media Detector</text>
  <text x="735" y="156" text-anchor="middle" fill="#64748b" font-size="9">Compression-Aware Deepfake Detection</text>

  <!-- Detection applications -->
  <rect x="610" y="172" width="250" height="52" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="625" y="192" fill="#6ee7b7" font-size="10" font-weight="600">INR Forensic Features (64d)</text>
  <text x="625" y="208" fill="#94a3b8" font-size="9">Reconstruction residuals as forensic signal</text>

  <rect x="610" y="234" width="250" height="66" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="625" y="254" fill="#6ee7b7" font-size="10" font-weight="600">Frozen Backbone + LoRA Adapters</text>
  <text x="625" y="270" fill="#94a3b8" font-size="9">Don't fine-tune large models (they forget)</text>
  <text x="625" y="286" fill="#94a3b8" font-size="9">Add lightweight adapters per generator</text>

  <rect x="610" y="310" width="250" height="52" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="625" y="330" fill="#6ee7b7" font-size="10" font-weight="600">Replay-Based Continual Learning</text>
  <text x="625" y="346" fill="#94a3b8" font-size="9">50K feature buffer, 0.5-0.7 replay weight</text>

  <rect x="610" y="372" width="250" height="52" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="625" y="392" fill="#6ee7b7" font-size="10" font-weight="600">Skip EWC/LwF for Detection CL</text>
  <text x="625" y="408" fill="#94a3b8" font-size="9">Proven failure on shared-param networks</text>

  <rect x="610" y="434" width="250" height="52" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="625" y="454" fill="#6ee7b7" font-size="10" font-weight="600">Compression-Invariant Features</text>
  <text x="625" y="470" fill="#94a3b8" font-size="9">INR captures structure, not fragile pixels</text>

  <rect x="610" y="496" width="250" height="52" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="625" y="516" fill="#6ee7b7" font-size="10" font-weight="600">Proven CL Parameters</text>
  <text x="625" y="532" fill="#94a3b8" font-size="9">100K buffer, 1.0 weight — not guesswork</text>

  <!-- CENTER: Bridge arrows -->
  <g>
    <line x1="295" y1="198" x2="605" y2="198" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGold)"/>
    <line x1="295" y1="267" x2="605" y2="267" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGold)"/>
    <line x1="295" y1="336" x2="605" y2="336" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGold)"/>
    <line x1="295" y1="398" x2="605" y2="398" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGold)"/>
    <line x1="295" y1="460" x2="605" y2="460" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGold)"/>
    <line x1="295" y1="522" x2="605" y2="522" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGold)"/>
  </g>
  <defs><marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/></marker></defs>

  <!-- Center label -->
  <rect x="395" y="128" width="110" height="28" rx="14" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="147" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">TRANSFERS TO</text>
</svg>
