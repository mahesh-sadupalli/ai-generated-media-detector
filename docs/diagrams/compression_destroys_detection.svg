<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="realGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">WHY DETECTORS FAIL IN THE REAL WORLD</text>
  <text x="450" y="60" text-anchor="middle" fill="#94a3b8" font-size="12">The compression pipeline destroys the forensic traces detectors rely on</text>

  <!-- Stage 1: Original -->
  <g filter="url(#shadow)">
    <rect x="30" y="90" width="160" height="140" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="30" y="90" width="160" height="4" rx="2" fill="url(#realGrad)"/>
    <text x="110" y="116" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">ORIGINAL CONTENT</text>
    <text x="110" y="140" text-anchor="middle" fill="#cbd5e1" font-size="10">GAN spectral peaks</text>
    <text x="110" y="156" text-anchor="middle" fill="#cbd5e1" font-size="10">Noise fingerprints</text>
    <text x="110" y="172" text-anchor="middle" fill="#cbd5e1" font-size="10">Texture micro-patterns</text>
    <text x="110" y="188" text-anchor="middle" fill="#cbd5e1" font-size="10">Diffusion traces</text>
    <text x="110" y="218" text-anchor="middle" fill="#10b981" font-size="20" font-weight="700">95%</text>
    <text x="110" y="228" text-anchor="middle" fill="#64748b" font-size="9">detection AUC</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="195" y1="160" x2="235" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#475569"/></marker></defs>

  <!-- Stage 2: Camera Codec -->
  <g filter="url(#shadow)">
    <rect x="240" y="90" width="140" height="140" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="240" y="90" width="140" height="4" rx="2" fill="url(#compGrad)"/>
    <text x="310" y="116" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">CAMERA CODEC</text>
    <text x="310" y="140" text-anchor="middle" fill="#cbd5e1" font-size="10">H.264 / H.265</text>
    <text x="310" y="158" text-anchor="middle" fill="#94a3b8" font-size="9">Block quantization</text>
    <text x="310" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">Motion compensation</text>
    <line x1="265" y1="192" x2="355" y2="192" stroke="#334155" stroke-width="1"/>
    <text x="310" y="210" text-anchor="middle" fill="#fbbf24" font-size="10">~15% traces lost</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="385" y1="160" x2="425" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Stage 3: Platform -->
  <g filter="url(#shadow)">
    <rect x="430" y="90" width="160" height="140" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="430" y="90" width="160" height="4" rx="2" fill="url(#compGrad)"/>
    <text x="510" y="116" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">SOCIAL MEDIA</text>
    <text x="510" y="140" text-anchor="middle" fill="#cbd5e1" font-size="10">WhatsApp: QF ~65</text>
    <text x="510" y="156" text-anchor="middle" fill="#cbd5e1" font-size="10">Instagram: QF ~75</text>
    <text x="510" y="172" text-anchor="middle" fill="#cbd5e1" font-size="10">TikTok: re-encode</text>
    <line x1="455" y1="192" x2="565" y2="192" stroke="#334155" stroke-width="1"/>
    <text x="510" y="210" text-anchor="middle" fill="#fb923c" font-size="10">~60% traces lost</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="595" y1="160" x2="635" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Stage 4: What detector sees -->
  <g filter="url(#shadow)">
    <rect x="640" y="90" width="230" height="140" rx="10" fill="#1e293b" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="640" y="90" width="230" height="4" rx="2" fill="url(#deadGrad)"/>
    <text x="755" y="116" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">WHAT THE DETECTOR SEES</text>
    <text x="755" y="140" text-anchor="middle" fill="#fca5a5" font-size="10" text-decoration="line-through">GAN spectral peaks</text>
    <text x="755" y="156" text-anchor="middle" fill="#fca5a5" font-size="10" text-decoration="line-through">Noise fingerprints</text>
    <text x="755" y="172" text-anchor="middle" fill="#cbd5e1" font-size="10">+ Block artifacts (false signal)</text>
    <text x="755" y="188" text-anchor="middle" fill="#cbd5e1" font-size="10">+ Quantization noise (false signal)</text>
    <text x="755" y="218" text-anchor="middle" fill="#ef4444" font-size="20" font-weight="700">50%</text>
    <text x="755" y="228" text-anchor="middle" fill="#64748b" font-size="9">detection AUC (coin flip)</text>
  </g>

  <!-- Bottom section: The four destruction mechanisms -->
  <text x="450" y="275" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">FOUR MECHANISMS OF FORENSIC DESTRUCTION</text>

  <!-- Mechanism boxes -->
  <g filter="url(#shadow)">
    <rect x="30" y="295" width="195" height="105" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="55" cy="318" r="12" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1"/>
    <text x="55" y="323" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">1</text>
    <text x="75" y="323" fill="#f87171" font-size="10" font-weight="600">HF Destruction</text>
    <text x="40" y="345" fill="#94a3b8" font-size="9">GAN checkerboard patterns,</text>
    <text x="40" y="358" fill="#94a3b8" font-size="9">noise fingerprints, texture</text>
    <text x="40" y="371" fill="#94a3b8" font-size="9">micro-patterns quantized to</text>
    <text x="40" y="384" fill="#94a3b8" font-size="9">zero at JPEG QF &lt; 80</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="295" width="195" height="105" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="265" cy="318" r="12" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
    <text x="265" y="323" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700">2</text>
    <text x="285" y="323" fill="#fbbf24" font-size="10" font-weight="600">Block Confusion</text>
    <text x="250" y="345" fill="#94a3b8" font-size="9">8x8 / 16x16 DCT block</text>
    <text x="250" y="358" fill="#94a3b8" font-size="9">boundaries mimic face-swap</text>
    <text x="250" y="371" fill="#94a3b8" font-size="9">artifacts, inflating false</text>
    <text x="250" y="384" fill="#94a3b8" font-size="9">positive rates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="295" width="195" height="105" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="475" cy="318" r="12" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-width="1"/>
    <text x="475" y="323" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="700">3</text>
    <text x="495" y="323" fill="#c084fc" font-size="10" font-weight="600">Smoothing Mimicry</text>
    <text x="460" y="345" fill="#94a3b8" font-size="9">Compression reduces texture</text>
    <text x="460" y="358" fill="#94a3b8" font-size="9">variance and local std —</text>
    <text x="460" y="371" fill="#94a3b8" font-size="9">identical signal to GAN</text>
    <text x="460" y="384" fill="#94a3b8" font-size="9">pixel-loss artifacts</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="295" width="210" height="105" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="685" cy="318" r="12" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
    <text x="685" y="323" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="700">4</text>
    <text x="705" y="323" fill="#60a5fa" font-size="10" font-weight="600">Noise Normalization</text>
    <text x="670" y="345" fill="#94a3b8" font-size="9">Camera noise replaced by</text>
    <text x="670" y="358" fill="#94a3b8" font-size="9">Gaussian quantization noise —</text>
    <text x="670" y="371" fill="#94a3b8" font-size="9">same statistical signature as</text>
    <text x="670" y="384" fill="#94a3b8" font-size="9">diffusion model denoising</text>
  </g>

  <!-- Bottom stat bar -->
  <rect x="30" y="420" width="840" height="80" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="446" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">DEEPFAKE-EVAL-2024 (Chandra et al.) — The Most Comprehensive In-the-Wild Benchmark</text>
  <text x="160" y="476" text-anchor="middle" fill="#ef4444" font-size="22" font-weight="700">-50%</text>
  <text x="160" y="492" text-anchor="middle" fill="#64748b" font-size="9">video AUC loss</text>
  <text x="370" y="476" text-anchor="middle" fill="#f59e0b" font-size="22" font-weight="700">-48%</text>
  <text x="370" y="492" text-anchor="middle" fill="#64748b" font-size="9">audio AUC loss</text>
  <text x="560" y="476" text-anchor="middle" fill="#a855f7" font-size="22" font-weight="700">-45%</text>
  <text x="560" y="492" text-anchor="middle" fill="#64748b" font-size="9">image AUC loss</text>
  <text x="750" y="476" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">from lab to real world</text>
</svg>
